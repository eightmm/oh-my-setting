name: cleanup-merged-branch

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  cleanup:
    if: github.repository == 'eightmm/oh-my-setting'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
      - name: remove merged development branch
        shell: bash
        env:
          BRANCH: agent/model-capability-doctor
        run: |
          set -euo pipefail
          git push origin --delete "$BRANCH"
