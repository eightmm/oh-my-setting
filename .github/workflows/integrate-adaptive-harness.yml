name: consolidate-stale-agent-branches

on:
  pull_request:
    types: [reopened, synchronize]

permissions:
  contents: write

jobs:
  cleanup:
    if: github.repository == 'eightmm/oh-my-setting' && github.event.pull_request.head.ref == 'agent/adaptive-harness-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: delete obsolete agent branches
        shell: bash
        run: |
          set -euo pipefail
          for branch in \
            agent/ai-control-plane \
            agent/loop-graph-engineering \
            agent/adaptive-harness-v1; do
            git push origin --delete "$branch" 2>/dev/null || true
          done
