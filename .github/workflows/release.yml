name: release

# Cut a release by pushing a tag that matches the VERSION file, e.g.:
#   git tag -a v0.4.0 -m v0.4.0 && git push origin v0.4.0
on:
  push:
    tags: ['v*']

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release
    env:
      TAG: ${{ github.ref_name }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7

      # Never publish a red tree: run the same gate as CI.
      - name: install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: verification gate
        run: bash scripts/check.sh

      # The tag must match the VERSION file so the release is unambiguous.
      - name: verify tag matches VERSION
        run: |
          want="v$(cat VERSION)"
          if [ "$TAG" != "$want" ]; then
            echo "error: tag $TAG does not match VERSION ($want)" >&2
            exit 1
          fi
          plugin_version="$(python3 -c 'import json; print(json.load(open("plugins/oh-my-setting/.codex-plugin/plugin.json"))["version"])')"
          if [ "$plugin_version" != "${TAG#v}" ]; then
            echo "error: plugin version $plugin_version does not match ${TAG#v}" >&2
            exit 1
          fi
          python3 - "${TAG#v}" CHANGELOG.md <<'PY'
          import re, sys
          version, path = sys.argv[1:]
          wanted = re.compile(r"^## \[" + re.escape(version) + r"\] - \d{4}-\d{2}-\d{2}$")
          if not any(wanted.fullmatch(line.rstrip("\n")) for line in open(path, encoding="utf-8")):
              raise SystemExit(f"error: CHANGELOG.md needs a dated section for {version}")
          PY

      - name: build pinned installer and checksums
        run: |
          mkdir -p release
          [ "$(grep -Fxc 'INSTALLER_DEFAULT_REF="edge"' install.sh)" = 1 ] || {
            echo "error: installer ref placeholder is missing or ambiguous" >&2
            exit 1
          }
          sed 's/^INSTALLER_DEFAULT_REF="edge"$/INSTALLER_DEFAULT_REF="'"$TAG"'"/' \
            install.sh > release/install.sh
          grep -Fxq "INSTALLER_DEFAULT_REF=\"$TAG\"" release/install.sh || {
            echo "error: generated installer is not pinned to $TAG" >&2
            exit 1
          }
          chmod +x release/install.sh
          scripts/gen-checksums.sh --strict > release/SHA256SUMS
          scripts/gen-checksums.sh --verify release/SHA256SUMS
          (cd release && sha256sum install.sh > install.sh.sha256 && sha256sum -c install.sh.sha256)
          echo "== SHA256SUMS =="; cat release/SHA256SUMS

      # Release notes are part of the release contract, not an optional fallback.
      - name: extract release notes
        run: |
          ver="${TAG#v}"
          awk -v v="$ver" '
            BEGIN { prefix = "## [" v "] - " }
            index($0, prefix) == 1 {
              date = substr($0, length(prefix) + 1)
              if (date ~ /^[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]$/) {f=1; next}
            }
            f && /^## / {exit}
            f {print}
          ' CHANGELOG.md > RELEASE_NOTES.md || true
          [ -s RELEASE_NOTES.md ] || {
            echo "error: CHANGELOG.md section for $ver has no release notes" >&2
            exit 1
          }

      - name: create release
        run: |
          gh release create "$TAG" release/install.sh release/install.sh.sha256 release/SHA256SUMS \
            --title "$TAG" --notes-file RELEASE_NOTES.md
