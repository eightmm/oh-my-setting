name: integrate-doctor-model

on:
  pull_request:

permissions:
  contents: write

jobs:
  integrate:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/doctor-model-integration'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: apply validated doctor integration
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PATCH_BLOBS: 1a7da250f1c310bb8d2f6419796df59a7becd1ea dc819ea3cfe3d7c76071438b92de037dfdb66376 b998555b9dd46a6fb7a36464c95e7846603f9efe ee28ce225e8506223709f6777bfea8f3d3fc479b 9e4a5cb451b8eb20a86971185c65420354a2e28b
        run: |
          set -euo pipefail
          if grep -Fq 'OH_MY_SETTING_MODEL_DOCTOR' scripts/doctor.sh; then
            echo 'doctor integration already present'
            exit 0
          fi
          : > /tmp/doctor-model-integration.patch
          for sha in $PATCH_BLOBS; do
            gh api "repos/$GITHUB_REPOSITORY/git/blobs/$sha" --jq .content |
              tr -d '\n' | base64 -d >> /tmp/doctor-model-integration.patch
          done
          git apply --check --include='scripts/doctor.sh' /tmp/doctor-model-integration.patch
          git apply --include='scripts/doctor.sh' /tmp/doctor-model-integration.patch
      - name: verify integrated tree
        shell: bash
        run: |
          set -euo pipefail
          bash -n scripts/doctor.sh tests/doctor-model-capability-smoke.sh
          python3 scripts/validate-skills.py .
          bash scripts/check-bash32.sh
          bash tests/model-doctor-smoke.sh
          bash tests/doctor-model-capability-smoke.sh
          bash tests/source-distribution-smoke.sh
      - name: commit integrated tree
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- scripts/doctor.sh; then
            echo 'doctor integration already committed'
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/doctor.sh
          git commit -m "feat: integrate model capability checks into doctor"
          git push origin HEAD:agent/doctor-model-integration
