name: integrate-doctor-model

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  integrate:
    if: github.repository == 'eightmm/oh-my-setting' && github.event.head_commit.message == 'ci: integrate model capability doctor into install health'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
      - name: apply validated integration patch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PATCH_BLOBS: __PATCH_BLOBS__
        run: |
          set -euo pipefail
          : > /tmp/doctor-model-integration.patch
          for sha in $PATCH_BLOBS; do
            gh api "repos/$GITHUB_REPOSITORY/git/blobs/$sha" --jq .content |
              tr -d '\n' | base64 -d >> /tmp/doctor-model-integration.patch
          done
          git apply --check /tmp/doctor-model-integration.patch
          git apply /tmp/doctor-model-integration.patch
          git rm .github/workflows/integrate-doctor-model.yml
      - name: verify model capability integration
        shell: bash
        run: |
          set -euo pipefail
          bash -n scripts/doctor.sh tests/doctor-model-capability-smoke.sh
          python3 scripts/validate-skills.py .
          bash scripts/check-bash32.sh
          bash tests/doctor-model-capability-smoke.sh
      - name: commit integrated tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat: integrate model capability checks into doctor"
          git push origin HEAD:main
