name: integrate-final

on:
  pull_request:

permissions:
  contents: write

jobs:
  integrate:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/model-capability-doctor'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: apply validated harness improvements
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PATCH_BLOBS: fc1c3447963e46f6cd5eb4c42f912858992a2d7c 1222fb8d43b3bf80bbb86b3b38f04fcaf4464db8 b48867bd13fb878c47186b3b0924af9644b493da
        run: |
          set -euo pipefail
          : > /tmp/oms-improvements.patch
          for sha in $PATCH_BLOBS; do
            gh api "repos/$GITHUB_REPOSITORY/git/blobs/$sha" --jq .content |
              tr -d '\n' | base64 -d >> /tmp/oms-improvements.patch
          done
          git apply --check /tmp/oms-improvements.patch
          git apply /tmp/oms-improvements.patch
          rm -f .github/workflows/agent-snapshot.yml
      - name: targeted verification
        shell: bash
        run: |
          set -euo pipefail
          bash -n scripts/model-doctor.sh scripts/lib/model-routing.sh tests/model-doctor-smoke.sh tests/source-distribution-smoke.sh
          python3 scripts/validate-skills.py .
          bash scripts/check-bash32.sh
          bash tests/model-doctor-smoke.sh
          bash tests/source-distribution-smoke.sh
      - name: commit integrated tree
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat: harden model routing and diversity gates"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
