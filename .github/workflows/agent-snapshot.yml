name: integrate-final

on:
  pull_request:

permissions:
  contents: write

jobs:
  integrate:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/model-capability-doctor'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: apply validated harness improvements
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PATCH_BLOBS: fdbd4cd5f09550f6734a802f5dabaf5f0c110628 a2a1850e2d9bd666cd5cf7c9d7648f6764b7a5f6 24f4dc12c8a55b98e7981f02ce73aece2d28be2a ea07be4f3215027662b8f463b191aa99aa374aef 89c35c7eb8ce83a6e66e47e6f692e9822ca780d6 7b63db3351a98675d7c1e870aa4632627b4d7a1b
        run: |
          set -euo pipefail
          : > /tmp/oms-code.patch
          for sha in $PATCH_BLOBS; do
            gh api "repos/$GITHUB_REPOSITORY/git/blobs/$sha" --jq .content |
              tr -d '\n' | base64 -d >> /tmp/oms-code.patch
          done
          test "$(git hash-object /tmp/oms-code.patch)" = b4987eca8405a5e52f4532299ca4285d8a2c7fa9
          if git apply --reverse --check /tmp/oms-code.patch; then
            echo "code patch already applied"
          else
            git apply --check /tmp/oms-code.patch
            git apply /tmp/oms-code.patch
          fi
      - name: targeted verification
        shell: bash
        run: |
          set -euo pipefail
          bash -n scripts/model-doctor.sh scripts/lib/model-routing.sh tests/model-doctor-smoke.sh
          python3 scripts/validate-skills.py .
          bash scripts/check-bash32.sh
          bash tests/model-doctor-smoke.sh
      - name: commit integrated code
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "no code changes to commit"
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add custom-skills docs scripts skills.manifest.json tests
          git commit -m "feat: harden model routing and diversity gates"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
