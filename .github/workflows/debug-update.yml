name: branch-fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix-update-fixture:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: make transactional update fixture branch-stable
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path("tests/update-v04-smoke.sh")
          text = path.read_text(encoding="utf-8")
          marker = "  # Pull-request checkouts are detached. Give the fixture an explicit default\n"
          if marker in text:
              raise SystemExit(0)
          needle = (
              '  git clone -q "$ROOT" "$source"\n'
              '  # During development the root may be dirty; copy the transaction files so\n'
          )
          replacement = (
              '  git clone -q "$ROOT" "$source"\n'
              '  # Pull-request checkouts are detached. Give the fixture an explicit default\n'
              '  # branch so update.sh can resolve edge through origin/HEAD.\n'
              '  git -C "$source" checkout -qB main\n'
              '  # During development the root may be dirty; copy the transaction files so\n'
          )
          if needle not in text:
              raise SystemExit("fixture insertion point not found")
          path.write_text(text.replace(needle, replacement, 1), encoding="utf-8")
          PY
          if git diff --quiet -- tests/update-v04-smoke.sh; then
            echo "fixture already fixed"
            exit 0
          fi
          bash -n tests/update-v04-smoke.sh
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add tests/update-v04-smoke.sh
          git commit -m "test: make update fixture branch-stable"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
